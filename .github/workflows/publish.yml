on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish (Debug)

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libmagick++-dev \
            libpoppler-cpp-dev \
            dvisvgm

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'

      - name: Install R Dependencies
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1
        env:
          RGL_USE_NULL: true

      - name: "Install shinylive outside renv"
        run: Rscript -e 'cat("", r"{.libPaths("~/work/aalborg-intelligence.github.io/aalborg-intelligence.github.io/renv/library/linux-ubuntu-noble/R-4.4/x86_64-pc-linux-gnu")}", file = "~/.Rprofile", sep = "\n", append = TRUE)'

      # -------------------------
      # 🔍 DEBUG RENDER STEP
      # -------------------------
      - name: Render site (debug mode)
        env:
          RGL_USE_NULL: true
          TINYTEX_VERBOSE: true
        run: |
          quarto check
          quarto render . \
            --log-level debug \
            --no-clean

      # -------------------------
      # 📦 UPLOAD ARTIFACTS ON FAILURE
      # -------------------------
      - name: Upload render artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quarto-debug
          path: |
            _site/
            _freeze/
            .quarto/

      # -------------------------
      # 🚀 PUBLISH (only if render succeeded)
      # -------------------------
      - name: Publish to gh-pages
        if: success()
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}